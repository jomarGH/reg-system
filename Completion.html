 height: 85px;

/* AUTO POPULATE FUNCTION */
function populateBooks() {
  const select = document.getElementById("book");

    option.value = book;
    option.textContent = book;
    select.appendChild(option);

/* ON BOOK CHANGE */
function onBookChange() {
  const book = document.getElementById("book").value;
  const chaptersInput = document.getElementById("chapters");

  if (!BOOK_DATA[book]) return;

  chaptersInput.value = BOOK_DATA[book].chapters;

  autoComputeVerses();
}

/* AUTO CALCULATE VERSES */
function autoComputeVerses() {
  const book = document.getElementById("book").value;
  const chapters = parseFloat(document.getElementById("chapters").value);

  if (!BOOK_DATA[book] || !chapters) return;

  const maxChapters = BOOK_DATA[book].chapters;
  const totalVerses = BOOK_DATA[book].verses;

  if (chapters > maxChapters) {
    alert(`❌ ${book} only has ${maxChapters} chapters`);
    document.getElementById("chapters").value = maxChapters;
    return;
  }

  const avg = totalVerses / maxChapters;
  const verses = Math.round(chapters * avg);

  document.getElementById("verses").value = verses;
}

/* LOAD */
let users = [];
let progressData = [];

async function load() {
  try {
    const res = await fetch(URL);
    const text = await res.text();

    console.log("RAW:", text);

    const json = JSON.parse(text);

    // ✅ CASE 1: OLD FORMAT (array)
    if (Array.isArray(json)) {
      users = json;
      progressData = []; // no progress yet
      console.log("Users:", users.length);
      console.log("Progress: 0");
      return;
    }

    // ✅ CASE 2: NEW FORMAT (object)
    if (json.status === "success") {
      users = json.users || [];
      progressData = json.progress || [];

      console.log("Users:", users.length);
      console.log("Progress:", progressData.length);
    } else {
      console.error("Backend error:", json);
      alert("❌ Backend error");
    }

  } catch (err) {
    console.error("Load failed:", err);
    alert("❌ Failed to load data");
  }
}

/* SEARCH */
function search() {
  const ref = document.getElementById("refno").value.trim();
  const mob = document.getElementById("mobile").value.trim();
  const name = document.getElementById("name").value.toLowerCase().trim();

  const inputMob = mob.replace(/\D/g,'').slice(-8);

  current = users.find(r => {
    const rRef = String(r.RefNo || "").trim();
    const rMob = String(r.Mobile || "").replace(/\D/g,'').slice(-8);
    const rName = String(r.Name || "").toLowerCase().trim();

    return (
      (ref && rRef === ref) ||
      (mob && rMob === inputMob) ||
      (name && rName.includes(name))
    );
  });

  const info = document.getElementById("info");

  if (current) {
    info.innerHTML = `<div class="success">✅ ${current.Name}</div>`;
  } else {
    info.innerHTML = `<div class="error">❌ Not found</div>`;
  }
}

function updateUserProgress() {
  if (!current) return;

  const userRef = current.RefNo;

  // 🔢 count total books finished by this user
  const userRecords = data.filter(r => String(r.RefNo) === String(userRef));

  const totalBooks = userRecords.length;
  const totalBibleBooks = 66;

  const percent = ((totalBooks / totalBibleBooks) * 100).toFixed(1);

  document.getElementById("progressBox").innerHTML =
    `📊 Progress: ${totalBooks}/66 books (${percent}%)`;
}

function autoComputeVerses() {
  const book = document.getElementById("book").value;
  const chaptersInput = document.getElementById("chapters");
  const versesInput = document.getElementById("verses");

  const chapters = parseFloat(chaptersInput.value);

  if (!BOOK_DATA[book]) return;

  const maxChapters = BOOK_DATA[book].chapters;
  const totalVerses = BOOK_DATA[book].verses;

  // ❌ Prevent invalid chapters
  if (chapters > maxChapters) {
    alert(`❌ ${book} only has ${maxChapters} chapters`);
    chaptersInput.value = maxChapters;
    return;
  }

  if (!chapters || chapters <= 0) return;

  const avg = totalVerses / maxChapters;
  const computed = Math.round(chapters * avg);

  versesInput.value = computed;
}

/* SAVE */

async function save() {

  if (!current) return alert("Search first");

  const book = document.getElementById("book").value.trim();
  const chapters = document.getElementById("chapters").value.trim();
  const verses = document.getElementById("verses").value.trim();
  const date = document.getElementById("date").value;

  // 🔒 VALIDATION (ALL FIELDS REQUIRED)
  if (!book || !chapters || !verses || !date) {
    alert("Please complete all fields before saving");
    return;
  }

  const response = await fetch(URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: new URLSearchParams({
      action: "saveProgress",
      refno: current.RefNo,
      name: current.Name,
      mobile: current.Mobile,
      registrationDate: current.RegistrationDate,
      book: book,
      chapters: chapters,
      verses: verses,
      date: date
    })
  });

  const text = await response.text();
  console.log("SAVE RAW:", text);

  let result;

  try {
    result = JSON.parse(text);
  } catch (err) {
    alert("❌ Invalid server response");
    return;
  }

  if (result.status === "success") {
    alert("✅ Saved successfully!");
  } else if (result.status === "duplicate") {
    alert("⚠️ " + result.message);
  } else {
    alert("❌ " + result.message);
  }
}
