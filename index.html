<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Reading Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg,#f5efe6,#e8dccb);
}

.container {
  max-width:500px;
  margin:50px auto;
  padding:20px;
}

.card {
  background:white;
  border-radius:20px;
  padding:30px;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
  text-align:center;
}

h1 {
  font-family:'Playfair Display', serif;
  color:#7a4c2c;
  font-size:x-large;
}

.subtitle {
  font-size:14px;
  color:#8b6b4c;
  margin-bottom:20px;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:30px;
  background:#7a4c2c;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover {
  background:#9b623c;
}

.success {
  background:#e8f5e9;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  text-align:left;
}

.error {
  background:#ffe0e0;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

.footer {
  margin-top:20px;
  font-size:12px;
  color:#8b6b4c;
}

.admin-link {
  margin-top:20px;
  font-size:14px;
}

.admin-link a {
  text-decoration:none;
  color:#7a4c2c;
  font-weight:bold;
}
/* HEADER ADD */
.header {
  text-align:center;
  margin-bottom:15px;
}
.logo {
  width:120px;
  max-width:40%;
  height:auto;
  margin-bottom:10px;
}

.community-name {
  font-size:16px;
  font-weight:600;
  color:#7a4c2c;
}

@media (max-width:480px){
  .logo { width:90px; }
  .community-name { font-size:14px; }
}

</style>
</head>

<body>

<div class="container">
  <div class="card">
<div class="header">
  <img src="logo church.jpg" class="logo">
  <div class="community-name">
    San Pedro Calungsod Filipino Catholic Community Qatar
  </div>
</div>
    <h1>📖 "The Word Journey”</h1>
    <div class="subtitle">Registration Form</div>

    <form id="form">
      <input type="text" id="name" placeholder="Full Name (e.g. Juan Cruz)" required>
      <input type="text" id="mobile" placeholder="Mobile (e.g. 66694789)" required>
      <input type="text" id="date" readonly>
      <button type="submit" id="submitBtn">Register Now</button>
    </form>

    <div id="msg"></div>

    <div class="admin-link">
      <a href="admin.html" target="_blank">🔐 Admin Panel</a>
    </div>

    <div class="footer">
      "Man shall not live by bread alone, but by every word that proceeds from the mouth of God." – Matthew 4:4
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzfwz9wdrTSad8z5CPk_OI1y1_7wlpmyzxJv5aZQAd4sN2EtAKWBxMLExI97FIomeRa/exec";

let existingData = [];

/* SET DATE */
function setDate(){
  document.getElementById("date").value =
  new Date().toISOString().split('T')[0];
}
setDate();

/* LOAD DATA */
async function loadData(){
  try{
    const res = await fetch(URL + "?password=bible2025");
    const text = await res.text();
    existingData = JSON.parse(text) || [];
  }catch(e){
    console.log("Load error", e);
  }
}
loadData();

/* FORMAT NAME */
function formatName(name){
  return name.toLowerCase().split(" ").filter(w=>w)
  .map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(" ");
}

/* 🔥 FIX: NORMALIZE MOBILE (FORCE STRING) */
function normalizeMobile(mobile){
  if(!mobile) return "";
  mobile = mobile.toString(); // ✅ FIX HERE
  return mobile.replace(/\D/g,'').slice(-8);
}

/* FORMAT MOBILE */
function formatMobile(mobile){
  let m = normalizeMobile(mobile);
  if(m.length !== 8) return null;
  return "+974" + m;
}

/* DUPLICATE CHECK */
function isDuplicate(name, mobile){

  let normName = name.toLowerCase().trim();
  let normMobile = normalizeMobile(mobile);

  return existingData.some(r => {

    let existingName = (r.Name || "").toLowerCase().trim();
    let existingMobile = normalizeMobile(r.Mobile || "");

    return existingName === normName &&
           existingMobile === normMobile;
  });
}

/* SUBMIT */
document.getElementById("form").addEventListener("submit", async (e)=>{
e.preventDefault();

let name = formatName(document.getElementById("name").value.trim());
let rawMobile = document.getElementById("mobile").value.trim();
let mobile = formatMobile(rawMobile);
const date = document.getElementById("date").value;

const msg = document.getElementById("msg");
const btn = document.getElementById("submitBtn");

/* VALIDATION */
if(!mobile){
  msg.innerHTML = `<div class="error">Invalid Qatar mobile number</div>`;
  return;
}

/* DUPLICATE */
if(isDuplicate(name, rawMobile)){
  msg.innerHTML = `<div class="error">This person is already registered.</div>`;
  return;
}

btn.disabled = true;
btn.innerText = "Submitting...";

try{

const res = await fetch(URL,{
  method:"POST",
  headers: {
    "Content-Type": "application/x-www-form-urlencoded"
  },
  body: new URLSearchParams({
    name: name,
    mobile: mobile,
    registrationDate: date
  })
});

const text = await res.text();
const data = JSON.parse(text);

if(data.status==="success"){

existingData.push({
  Name:name,
  Mobile:mobile.toString() // ✅ SAFE PUSH
});

/* SUCCESS UI */
msg.innerHTML = `
<div class="success" style="text-align:center;">

<img src="logo spcfcc.jpg" style="width:100px; margin-bottom:10px;">

<div style="font-weight:bold; color:#7a4c2c; margin-bottom:10px;">
San Pedro Calungsod Filipino Catholic Community Qatar
</div>

<strong>✅ Successfully Registered</strong><br><br>

RefNo: ${data.refno}<br>
Name: ${name}<br>
Mobile: ${mobile}

<br><br>
<canvas id="qr"></canvas><br><br>

<button onclick="printSlip('${data.refno}','${name}','${mobile}')">🖨 Print Slip</button>
<button onclick="resetForm()">🔄 Register New</button>
<button onclick="exitSystem()">❌ Exit</button>
</div>
`;

QRCode.toCanvas(document.getElementById('qr'),
`Ref:${data.refno} Name:${name} Mobile:${mobile}`);

}else{
msg.innerHTML = `<div class="error">${data.message}</div>`;
btn.disabled = false;
btn.innerText = "Register Now";
}

}catch(e){
console.log(e);
msg.innerHTML = `<div class="error">Connection error. Try again.</div>`;
btn.disabled = false;
btn.innerText = "Register Now";
}

});

/* RESET */
function resetForm(){
document.getElementById("form").reset();
document.getElementById("msg").innerHTML="";
document.getElementById("submitBtn").disabled = false;
document.getElementById("submitBtn").innerText="Register Now";
setDate();
}

/* EXIT */
function exitSystem(){
window.location.href = "about:blank";
}

/* PRINT */
function printSlip(ref,name,mobile){
const w = window.open('');
w.document.write(`
<h2>Bible Registration</h2>
<p>RefNo: ${ref}</p>
<p>Name: ${name}</p>
<p>Mobile: ${mobile}</p>
`);
w.print();
}
</script>

</body>
</html>
