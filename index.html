<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Bible Reading Registration | The Word Journey</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}
body {
  margin:0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg,#f5efe6,#e8dccb);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  max-width:500px;
  margin:auto;
  padding:15px;
  width: 100%;
}
.card {
  width:100%;
  max-width:420px;
  margin:auto;
  background: url("backgrnd1.png") no-repeat center center;
  background-size: cover;
  border-radius:20px;
  padding:25px;
  box-shadow:0 20px 40px rgba(0,0,0,0.25);
  text-align:center;
  color:white;
  position: relative;
}
.card * {
  position: relative;
  z-index: 1;
}
.card::before {
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.55);
  border-radius:20px;
  z-index:0;
}
h1 {
  font-family:'Playfair Display', serif;
  color:white;
  font-size:x-large;
  margin-top: 10px;
}

.subtitle {
  font-size:14px;
  color:#f1e6d6;
  margin-bottom:20px;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size: 16px;
  background: rgba(255,255,255,0.95);
}

button {
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:#b8894a;
  color:white;
  font-weight:bold;
  min-height:50px;
  cursor:pointer;
  font-size: 16px;
  transition: all 0.2s ease;
}

button:hover {
  background:#d4a25f;
  transform: translateY(-2px);
}

/* Home button specific style */
.home-btn {
  background: #6c5c4a;
}

.home-btn:hover {
  background: #5a4d3e;
}

.success {
  background:#e8f5e9;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  text-align:left;
  font-weight:bold; 
  color:black;
}

.error {
  background:#ffe0e0;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

.footer {
  margin-top:20px;
  padding-bottom:10px;
  font-size:11px;
  color:#f1e6d6;
  line-height: 1.4;
}

.admin-link {
  margin-top:20px;
  font-size:14px;
}

.admin-link a {
  text-decoration:none;
  color:#f0e0c0;
  font-weight:bold;
}

.button-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 5px;
}

.header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  text-align:center;
  margin-bottom:20px;
  gap:12px;
}
.logo {
  width:45px;
  height:auto;
  max-width:40%;
  margin-bottom:5px;
  object-fit:contain;
  display: block;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
}

.community-name {
  flex:1;
  text-align:center;
  font-size:14px;
  font-weight:bold;
  color:white;
  padding:0 8px;
  line-height:1.3;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
}
.logo.left {
  margin-right:5px;
  width: 70px;
}

.logo.right {
  margin-left:5px;
  width: 60px;
}
.success-logos {
  display:flex;
  justify-content:center;
  gap:15px;
  margin-bottom:10px;
}

.success-logo {
  width:50px;
  height:50px;
  object-fit:contain;
}

@keyframes fadeIn {
  from { opacity:0; transform:scale(0.8); }
  to { opacity:1; transform:scale(1); }
}

.success-logo {
  animation: fadeIn 0.5s ease-in-out;
}

@media (max-width:480px){
  .logo.left { width: 60px; }
  .logo.right { width: 52px; }
  .community-name { font-size: 11px; }
  .card { padding: 20px 15px; }
  h1 { font-size: 20px; }
  .subtitle { font-size: 12px; }
  input, button { padding: 14px; font-size: 15px; }
  .footer { font-size: 10px; }
  .success-logo { width: 40px; height: 40px; }
  .button-group { gap: 8px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <!-- HEADER START -->
    <div class="header">
      <img src="rblogo church.png" class="logo left" alt="Church Logo">
      <div class="community-name">
        San Pedro Calungsod Filipino Catholic Community Qatar
      </div>
      <img src="rblogo spcfcc.png" class="logo right" alt="Community Logo">
    </div>
    <!-- HEADER END -->
    
    <h1>📖 "The Word Journey"</h1>
    <div class="subtitle">Registration Form</div>

    <form id="form">
      <input type="text" id="name" placeholder="Full Name (e.g. Juan Cruz)" required autocomplete="off">
      <input type="tel" id="mobile" placeholder="Mobile (e.g. 66694789)" required autocomplete="off">
      <input type="text" id="date" readonly>
      
      <div class="button-group">
        <button type="submit" id="submitBtn">📝 Register Now</button>
        <button type="button" id="homeBtn" class="home-btn">🏠 Home</button>
      </div>
    </form>

    <div id="msg"></div>

    <div class="admin-link">
      <a href="admin.html" target="_blank">🔐 Admin Panel</a>
    </div>

    <div class="footer">
      "Man shall not live by bread alone, but by every word that proceeds from the mouth of God." – Matthew 4:4
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzfwz9wdrTSad8z5CPk_OI1y1_7wlpmyzxJv5aZQAd4sN2EtAKWBxMLExI97FIomeRa/exec";

let existingData = [];

/* SET DATE */
function setDate(){
  document.getElementById("date").value = new Date().toISOString().split('T')[0];
}
setDate();

/* LOAD DATA */
async function loadData(){
  try{
    const res = await fetch(URL + "?password=bible2025");
    const text = await res.text();
    existingData = JSON.parse(text) || [];
  }catch(e){
    console.log("Load error", e);
  }
}
loadData();

/* FORMAT NAME */
function formatName(name){
  return name.toLowerCase().split(" ").filter(w=>w)
    .map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(" ");
}

/* NORMALIZE MOBILE */
function normalizeMobile(mobile){
  if(!mobile) return "";
  mobile = mobile.toString();
  return mobile.replace(/\D/g,'').slice(-8);
}

/* FORMAT MOBILE */
function formatMobile(mobile){
  let m = normalizeMobile(mobile);
  if(m.length !== 8) return null;
  return "+974" + m;
}

/* DUPLICATE CHECK */
function isDuplicate(name, mobile){
  let normName = name.toLowerCase().trim();
  let normMobile = normalizeMobile(mobile);
  return existingData.some(r => {
    let existingName = (r.Name || "").toLowerCase().trim();
    let existingMobile = normalizeMobile(r.Mobile || "");
    return existingName === normName && existingMobile === normMobile;
  });
}

/* HOME BUTTON FUNCTION - Navigate to Home.html */
function goHome() {
  window.location.href = "Home.html";
}

/* SUBMIT */
document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  let name = formatName(document.getElementById("name").value.trim());
  let rawMobile = document.getElementById("mobile").value.trim();
  let mobile = formatMobile(rawMobile);
  const date = document.getElementById("date").value;

  const msg = document.getElementById("msg");
  const btn = document.getElementById("submitBtn");

  if(!mobile){
    msg.innerHTML = `<div class="error">❌ Invalid Qatar mobile number. Please enter 8-digit number.</div>`;
    return;
  }

  if(isDuplicate(name, rawMobile)){
    msg.innerHTML = `<div class="error">
      <strong>⚠️ This person is already registered.</strong><br><br>
      <button onclick="resetForm()">🔄 Register New Person</button>
    </div>`;
    return;
  }

  btn.disabled = true;
  btn.innerText = "Submitting...";

  try{
    const res = await fetch(URL,{
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: new URLSearchParams({
        name: name,
        mobile: mobile,
        registrationDate: date
      })
    });

    const text = await res.text();
    const data = JSON.parse(text);

    if(data.status === "success"){
      existingData.push({
        Name: name,
        Mobile: mobile.toString()
      });

      msg.innerHTML = `
        <div class="success">
          <div class="success-logos">
            <img src="rblogo church.png" class="success-logo" alt="Church Logo">
            <img src="rblogo spcfcc.png" class="success-logo" alt="Community Logo">
          </div>
          <div style="font-weight:bold; color:#7a4c2c; margin-bottom:10px;">
            San Pedro Calungsod Filipino Catholic Community Qatar
          </div>
          <strong>✅ Successfully Registered!</strong><br><br>
          <strong>Ref No:</strong> ${data.refno}<br>
          <strong>Name:</strong> ${name}<br>
          <strong>Mobile:</strong> ${mobile}
          <br><br>
          <button onclick="downloadReceipt('${data.refno}','${name}','${mobile}')">📄 Download Receipt</button>
          <button onclick="resetForm()">🔄 Register New</button>
          <button onclick="exitSystem()">❌ Exit</button>
          <button onclick="goHome()">🏠 Home</button>
        </div>
      `;
      downloadReceipt(data.refno, name, mobile);
    } else {
      msg.innerHTML = `<div class="error">❌ ${data.message || "Registration failed. Please try again."}</div>`;
      btn.disabled = false;
      btn.innerText = "Register Now";
    }
  } catch(e){
    console.log(e);
    msg.innerHTML = `<div class="error">⚠️ Connection error. Please check your internet and try again.</div>`;
    btn.disabled = false;
    btn.innerText = "Register Now";
  }
});

/* RESET FORM */
function resetForm(){
  document.getElementById("form").reset();
  document.getElementById("msg").innerHTML = "";
  document.getElementById("submitBtn").disabled = false;
  document.getElementById("submitBtn").innerText = "Register Now";
  setDate();
}

/* EXIT SYSTEM */
function exitSystem(){
  if (confirm("Are you sure you want to exit?")) {
    window.location.href = "about:blank";
    window.close();
  }
}

/* DOWNLOAD RECEIPT PDF */
function downloadReceipt(refno, name, mobile){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  // Header with community name
  doc.setFontSize(12);
  doc.setFont(undefined, 'bold');
  doc.text("San Pedro Calungsod Filipino Catholic Community Qatar", 105, 20, null, null, "center");
  
  doc.setFontSize(14);
  doc.setFont(undefined, 'bold');
  doc.text("THE WORD JOURNEY", 105, 32, null, null, "center");
  
  doc.setFont(undefined, 'normal');
  doc.setFontSize(11);
  doc.text("Registration Receipt", 105, 42, null, null, "center");
  
  doc.line(20, 46, 190, 46);
  
  doc.setFontSize(11);
  doc.text(`Ref No: ${refno}`, 20, 65);
  doc.text(`Name: ${name}`, 20, 80);
  doc.text(`Mobile: ${mobile}`, 20, 95);
  
  const today = new Date().toLocaleString();
  doc.text(`Registered: ${today}`, 20, 110);
  
  doc.setFontSize(9);
  doc.text(
    '"Man shall not live by bread alone, but by every word that proceeds from the mouth of God." – Matthew 4:4',
    105,
    135,
    null,
    null,
    "center"
  );
  
  doc.save(`WordJourney_Receipt_${refno}.pdf`);
}

/* HOME BUTTON EVENT LISTENER - Navigates to Home.html */
document.getElementById("homeBtn").addEventListener("click", function() {
  window.location.href = "Home.html";
});
</script>

</body>
</html>
