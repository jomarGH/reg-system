<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Reading Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#f5efe6,#e8dccb);
}

.container {
  max-width:500px;
  margin:50px auto;
  padding:20px;
}

.card {
  background:white;
  border-radius:20px;
  padding:30px;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
  text-align:center;
}

h1 {
  font-family:'Playfair Display',serif;
  color:#7a4c2c;
}

.subtitle {
  font-size:14px;
  color:#8b6b4c;
  margin-bottom:20px;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:30px;
  background:#7a4c2c;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover {
  background:#9b623c;
}

.success {
  background:#e8f5e9;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  text-align:left;
}

.error {
  background:#ffe0e0;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

.footer {
  margin-top:20px;
  font-size:12px;
  color:#8b6b4c;
}

.admin-link {
  margin-top:20px;
  font-size:14px;
}

.admin-link a {
  text-decoration:none;
  color:#7a4c2c;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>📖 Bible Reading</h1>
<div class="subtitle">Registration Form</div>

<form id="form">
<input type="text" id="name" placeholder="Full Name" required>
<input type="text" id="mobile" placeholder="Mobile" required>
<input type="text" id="date" readonly>
<button type="submit" id="submitBtn">Register Now</button>
</form>

<div id="msg"></div>

<div class="admin-link">
<a href="admin.html" target="_blank">🔐 Admin Panel</a>
</div>

<div class="footer">
"Man shall not live by bread alone, but by every word that proceeds from the mouth of God." – Matthew 4:4
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzfwz9wdrTSad8z5CPk_OI1y1_7wlpmyzxJv5aZQAd4sN2EtAKWBxMLExI97FIomeRa/exec";

function setDate(){
  document.getElementById("date").value =
  new Date().toISOString().split('T')[0];
}
setDate();

function formatName(name){
  return name.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());
}

function formatMobile(mobile){
  mobile = mobile.replace(/\D/g,'');
  if(mobile.startsWith("974")) mobile = mobile.slice(3);
  if(mobile.length !== 8) return null;
  return "+974"+mobile;
}

document.getElementById("form").addEventListener("submit", async (e)=>{
e.preventDefault();

let name = formatName(document.getElementById("name").value.trim());
let mobile = formatMobile(document.getElementById("mobile").value.trim());
let date = document.getElementById("date").value;

let msg = document.getElementById("msg");
let btn = document.getElementById("submitBtn");

if(!mobile){
  msg.innerHTML = `<div class="error">Invalid Mobile Number</div>`;
  return;
}

btn.disabled = true;
btn.innerText = "Submitting...";

try{

// 🔥 FIXED: FormData (KEEP WORKING BACKEND)
const formData = new FormData();
formData.append("name", name);
formData.append("mobile", mobile);
formData.append("registrationDate", date);

const res = await fetch(URL,{
  method:"POST",
  body:formData
});

const data = await res.json();

if(data.status==="success"){

window.open(`https://wa.me/${mobile.replace('+','')}?text=${encodeURIComponent(
`Hello ${name}, you are successfully registered 🙏\nRefNo: ${data.refno}`
)}`, "_blank");

msg.innerHTML = `
<div class="success">
<strong>✅ Successfully Registered</strong><br><br>

RefNo: ${data.refno}<br>
Name: ${name}<br>
Mobile: ${mobile}

<br><br>
<canvas id="qr"></canvas><br><br>

<button onclick="resetForm()">🔄 Register New</button>
</div>
`;

QRCode.toCanvas(document.getElementById('qr'),
`Ref:${data.refno} Name:${name} Mobile:${mobile}`);

}else{
msg.innerHTML = `<div class="error">Failed</div>`;
btn.disabled = false;
btn.innerText = "Register Now";
}

}catch(err){
msg.innerHTML = `<div class="error">Connection Error</div>`;
btn.disabled = false;
btn.innerText = "Register Now";
}

});

function resetForm(){
document.getElementById("form").reset();
document.getElementById("msg").innerHTML="";
document.getElementById("submitBtn").disabled=false;
document.getElementById("submitBtn").innerText="Register Now";
setDate();
}
</script>

</body>
</html>
