<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Reading Registration - Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
/* ALL YOUR ORIGINAL STYLES REMAIN THE SAME */
* { box-sizing: border-box; }

body {
  margin:0;
  font-family:'Inter', sans-serif;
  background: linear-gradient(135deg,#f5efe6,#e8dccb);
}

.container {
  max-width:500px;
  margin:auto;
  padding:15px;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card {
  width:100%;
  max-width:420px;
  background: url("backgrnd1.png") no-repeat center center;
  background-size: cover;
  border-radius:20px;
  padding:25px;
  box-shadow:0 20px 40px rgba(0,0,0,0.25);
  text-align:center;
  color:white;
  position:relative;
}

.card::before {
  content:"";
  position:absolute;
  inset:0;
  background: rgba(0,0,0,0.5);
  border-radius:20px;
}

.card * { position:relative; z-index:1; }

h1 {
  font-family:'Playfair Display', serif;
  font-size:x-large;
}

.subtitle {
  font-size:14px;
  color:#f1e6d6;
  margin-bottom:20px;
}

.input-group {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  align-items: center;
}
.input-group input[type="file"] {
  flex: 2;
  padding: 10px;
  margin-top: 0;
  background: white;
  color: #333;
  font-size: 13px;
}
.input-group button {
  flex: 1;
  margin-top: 0;
  padding: 10px;
  min-height: auto;
  cursor: pointer;
  background: #4a6a8a;
  transition: 0.2s;
}
.input-group button:hover {
  background: #2c4a6a;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
  background: white;
  color: #1e2a3a;
}

button, .action-btn {
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:#b8894a;
  color:white;
  font-weight:bold;
  min-height:50px;
  font-size:16px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover, .action-btn:hover {
  background:#9a6f3a;
  cursor: pointer;
}

.secondary-btn {
  background: #1A2A4A;
}
.secondary-btn:hover {
  background: #D4AF37;
  color: #1A2A4A;
}

.exit-btn {
  background: #dc3545;
  margin-top: 10px;
}
.exit-btn:hover {
  background: #c82333;
  transform: translateY(-1px);
}

.admin-panel {
  margin-top: 20px;
  padding-top: 15px;
  border-top: 1px solid rgba(255,255,255,0.3);
}

.footer {
  margin-top:10px;
  padding-bottom:30px;
  font-size:12px;
  color:#f1e6d6;
}

.header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
}

.logo {
  height:70px;
  object-fit:contain;
}

.community-name {
  flex:1;
  text-align:center;
  font-size:14px;
  font-weight:bold;
}

.status-msg {
  margin-top: 12px;
  font-size: 12px;
  padding: 6px;
  border-radius: 20px;
  background: rgba(0,0,0,0.5);
}
.status-msg.success { color: #a5d6a5; }
.status-msg.error { color: #ffaaaa; background: rgba(100,0,0,0.5); }
.status-msg.loading { color: #ffd966; }

.file-info {
  margin-top: 8px;
  font-size: 11px;
  background: rgba(0,0,0,0.4);
  padding: 6px;
  border-radius: 12px;
}

.search-row {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  align-items: center;
}
.search-row input {
  flex: 2;
  margin-top: 0;
}
.search-row button {
  flex: 1;
  margin-top: 0;
  padding: 12px;
  min-height: auto;
}

/* Certificate Modal Styles */
.certificate-modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}

.certificate-content {
  background: white;
  padding: 20px;
  border-radius: 10px;
  max-width: 95%;
  max-height: 95%;
  overflow: auto;
  position: relative;
}

.certificate-preview {
  width: 100%;
  max-width: 800px;
  margin: 0 auto;
}

.certificate-preview img {
  width: 100%;
  height: auto;
  display: block;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.close-modal {
  position: absolute;
  top: 10px;
  right: 25px;
  font-size: 35px;
  font-weight: bold;
  cursor: pointer;
  color: #333;
  background: white;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

.close-modal:hover {
  background: #dc3545;
  color: white;
}

.print-btn, .download-btn, .batch-btn {
  margin: 10px;
  padding: 10px 20px;
  background: #b8894a;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 14px;
  width: auto;
  display: inline-block;
}

.print-btn:hover, .download-btn:hover, .batch-btn:hover {
  background: #9a6f3a;
}

.batch-btn {
  background: #28a745;
}

.batch-btn:hover {
  background: #1e7e34;
}

#generateCertBtn {
  background: #28a745;
  margin-top: 10px;
}

#generateCertBtn:hover {
  background: #1e7e34;
}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="header">
      <img src="rblogo church.png" class="logo" alt="church logo">
      <div class="community-name">
        San Pedro Calungsod Filipino Catholic Community Qatar
      </div>
      <img src="bmlogo-rb.png" class="logo" alt="bible logo">
    </div>

    <h1>📖 The Word Journey</h1>
    <div class="subtitle">Certification Form</div>

    <div>
      <div class="input-group">
        <input type="file" id="csvFileInput" accept=".csv">
        <button id="loadCsvBtn">Load CSV Data</button>
      </div>
      <div id="statusMsg" class="status-msg"></div>
      <div id="fileInfo" class="file-info"></div>

      <div class="search-row">
        <input type="text" id="refnoInput" placeholder="Search by RefNo (e.g. 26001)">
        <button id="searchBtn" class="secondary-btn">Load Certificate</button>
      </div>

      <input type="text" id="booksDisplay" placeholder="Books Completed" readonly>
      <button id="updateBooksBtn" class="secondary-btn">Update Milestone (Override)</button>
      <button id="generateCertBtn">🎓 Generate Certificate</button>
    </div>

    <div class="admin-panel">
      <button id="exitHomeBtn" class="exit-btn">🏠 Exit / Return to Home</button>
    </div>

    <div class="footer">
      "Man shall not live by bread alone, but by every word that proceeds from the mouth of God." – Matthew 4:4
    </div>
  </div>
</div>

<!-- Certificate Modal -->
<div id="certificateModal" class="certificate-modal">
  <div class="certificate-content">
    <span class="close-modal">&times;</span>
    <div id="certificateDisplay" class="certificate-preview"></div>
    <div style="text-align: center; margin-top: 20px;">
      <button id="printCertificateBtn" class="print-btn">🖨️ Print Certificate</button>
      <button id="downloadCertificateBtn" class="download-btn">📥 Download as PNG</button>
      <button id="batchCertificatesBtn" class="batch-btn">📚 Generate All Certificates</button>
    </div>
  </div>
</div>

<script>
  // ==================== DATABASE & CSV HANDLER ====================
  let disciplesDB = {};
  let booksCache = {};
  let csvLoaded = false;
  let currentRefNo = null;
  let currentDisciple = null;

  const CERTIFICATE_BG = "certificate_bg.png";

  function loadBooksCache() {
    const saved = localStorage.getItem("wordJourney_books");
    if (saved) booksCache = JSON.parse(saved);
  }
  
  function saveBooksCache() {
    localStorage.setItem("wordJourney_books", JSON.stringify(booksCache));
  }

  function parseCSV(csvText) {
    const lines = csvText.split(/\r?\n/);
    if (lines.length < 2) return {};
    const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
    const refnoIndex = headers.findIndex(h => h.toLowerCase() === 'refno');
    const nameIndex = headers.findIndex(h => h.toLowerCase() === 'name');
    const mobileIndex = headers.findIndex(h => h.toLowerCase() === 'mobile');
    const booksIndex = headers.findIndex(h => h.toLowerCase() === 'fully completed books');
    const booksListIndex = headers.findIndex(h => h.toLowerCase() === 'completed books list');
    
    const newDB = {};
    for (let i = 1; i < lines.length; i++) {
      if (!lines[i].trim()) continue;
      const row = [];
      let inQuote = false, current = '';
      for (let ch of lines[i]) {
        if (ch === '"') inQuote = !inQuote;
        else if (ch === ',' && !inQuote) { row.push(current); current = ''; }
        else current += ch;
      }
      row.push(current);
      const refno = (row[refnoIndex] || '').replace(/"/g, '').trim();
      const name = (row[nameIndex] || '').replace(/"/g, '').trim();
      const mobile = (row[mobileIndex] || '').replace(/"/g, '').trim();
      let completedBooks = parseInt(row[booksIndex]) || 0;
      let completedBooksList = (row[booksListIndex] || '').replace(/"/g, '').trim();
      if (completedBooksList) completedBooksList = completedBooksList.replace(/;$/, '');
      if (refno && name) {
        newDB[refno] = {
          name, mobile,
          csvBooks: completedBooks,
          csvBooksList: completedBooksList,
          books: booksCache[refno] !== undefined ? booksCache[refno] : completedBooks,
          booksList: completedBooksList
        };
      }
    }
    return newDB;
  }

  function loadCSVFile(file) {
    const statusDiv = document.getElementById('statusMsg');
    const fileInfo = document.getElementById('fileInfo');
    if (!file) {
      statusDiv.className = "status-msg error";
      statusDiv.innerHTML = '❌ Please select a CSV file first';
      return;
    }
    statusDiv.className = "status-msg loading";
    statusDiv.innerHTML = `⏳ Loading ${file.name}...`;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const csvText = e.target.result;
        disciplesDB = parseCSV(csvText);
        csvLoaded = true;
        const count = Object.keys(disciplesDB).length;
        fileInfo.innerHTML = `✅ Loaded ${count} disciples from ${file.name}`;
        statusDiv.className = "status-msg success";
        statusDiv.innerHTML = `✅ Success! ${count} records ready.`;
        if (count > 0) {
          const firstRefno = Object.keys(disciplesDB)[0];
          document.getElementById('refnoInput').value = firstRefno;
          loadCertificateByRefno(firstRefno);
        }
      } catch (err) {
        statusDiv.className = "status-msg error";
        statusDiv.innerHTML = `❌ CSV error: ${err.message}`;
        fileInfo.innerHTML = `❌ Failed to parse.`;
      }
    };
    reader.onerror = () => {
      statusDiv.className = "status-msg error";
      statusDiv.innerHTML = '❌ File read error';
    };
    reader.readAsText(file, 'UTF-8');
  }

  function getMilestoneFromBooks(books) {
    if (books >= 73) return { title: "Bible Complete - Master of the Word", icon: "📖✨" };
    if (books >= 50) return { title: "Sage of Stories", icon: "👑" };
    if (books >= 40) return { title: "Chapter Champion", icon: "🏆" };
    if (books >= 30) return { title: "Literary Explorer", icon: "🗺️" };
    if (books >= 25) return { title: "Word Wanderer", icon: "🌍" };
    if (books >= 20) return { title: "Journey Keeper", icon: "🔑" };
    if (books >= 15) return { title: "Story Seeker", icon: "⛰️" };
    if (books >= 10) return { title: "Page Turner Award", icon: "📘" };
    return { title: "First Landmark", icon: "📖" };
  }

  function displayCertificatePreview(disciple, refno, books) {
    const milestone = getMilestoneFromBooks(books);
    const previewDiv = document.getElementById('statusMsg');
    if (!disciple) {
      previewDiv.className = "status-msg error";
      previewDiv.innerHTML = `❌ No disciple data for RefNo ${refno}`;
      return;
    }
    previewDiv.className = "status-msg success";
    previewDiv.innerHTML = `✅ ${disciple.name} | Ref: ${refno} | Books: ${books} | ${milestone.title}`;
    document.getElementById('booksDisplay').value = books;
    currentRefNo = refno;
    currentDisciple = disciple;
  }

  function loadCertificateByRefno(refno) {
    const statusDiv = document.getElementById('statusMsg');
    if (!csvLoaded || Object.keys(disciplesDB).length === 0) {
      statusDiv.className = "status-msg error";
      statusDiv.innerHTML = '❌ Please load CSV file first.';
      return;
    }
    if (!refno) {
      statusDiv.className = "status-msg error";
      statusDiv.innerHTML = '❌ Enter a RefNo';
      return;
    }
    const disciple = disciplesDB[refno];
    if (!disciple) {
      statusDiv.className = "status-msg error";
      statusDiv.innerHTML = `❌ RefNo ${refno} not found in CSV`;
      return;
    }
    const savedBooks = booksCache[refno] !== undefined ? booksCache[refno] : disciple.csvBooks;
    disciple.books = savedBooks;
    displayCertificatePreview(disciple, refno, savedBooks);
  }

  function updateBooksOverride() {
    if (!currentRefNo || !currentDisciple) {
      const statusDiv = document.getElementById('statusMsg');
      statusDiv.className = "status-msg error";
      statusDiv.innerHTML = '❌ Please load a disciple first (search by RefNo)';
      return;
    }
    let newBooks = prompt("Enter new number of completed books:", currentDisciple.books);
    if (newBooks === null) return;
    newBooks = parseInt(newBooks, 10);
    if (isNaN(newBooks) || newBooks < 0) {
      alert("Enter valid number");
      return;
    }
    booksCache[currentRefNo] = newBooks;
    saveBooksCache();
    currentDisciple.books = newBooks;
    disciplesDB[currentRefNo].books = newBooks;
    displayCertificatePreview(currentDisciple, currentRefNo, newBooks);
    const statusDiv = document.getElementById('statusMsg');
    statusDiv.className = "status-msg success";
    statusDiv.innerHTML = `✅ Updated ${currentDisciple.name} to ${newBooks} books (${getMilestoneFromBooks(newBooks).title})`;
  }

  // ==================== QR CODE GENERATION ====================
  function generateSimpleQRCode(text, size = 120) {
    return new Promise((resolve, reject) => {
      const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}&margin=10`;
      
      const qrImg = new Image();
      qrImg.crossOrigin = "Anonymous";
      
      qrImg.onload = function() {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(qrImg, 0, 0, size, size);
        resolve(canvas.toDataURL('image/png'));
      };
      
      qrImg.onerror = function() {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, size, size);
        ctx.fillStyle = '#FF0000';
        ctx.font = '10px Arial';
        ctx.fillText('QR Error', size/2 - 25, size/2);
        resolve(canvas.toDataURL('image/png'));
      };
      
      qrImg.src = qrApiUrl;
    });
  }

  // ===== UPDATED CERTIFICATE GENERATION - NO BOOKS, SMALLER NAME, REFNO LEFT, DATE BOTTOM, QR RIGHT =====
  async function generateCertificateImage(disciple, refno, books) {
    return new Promise(async (resolve, reject) => {
      const today = new Date().toLocaleDateString('en-US', { 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
      }).toUpperCase();
      
      const verificationURL = `${window.location.origin}${window.location.pathname}?refno=${refno}`;
      
      const img = new Image();
      img.crossOrigin = "Anonymous";
      
      img.onload = async function() {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        
        // STUDENT NAME - smaller font (32px instead of 42px)
        ctx.font = `bold 32px 'Playfair Display', 'Times New Roman', serif`;
        ctx.fillStyle = '#2c1810';
        ctx.textAlign = 'center';
        const nameY = canvas.height * 0.44;
        ctx.fillText(disciple.name.toUpperCase(), canvas.width / 2, nameY);
        
        // NO BOOKS COMPLETED - REMOVED
        
        // DISCIPLES REF NO - LEFT SIDE
        ctx.font = `14px 'Inter', monospace`;
        ctx.fillStyle = '#000';
        ctx.textAlign = 'left';
        const refY = canvas.height * 0.78;
        ctx.fillText(`DISCIPLES Ref No: ${refno}`, canvas.width * 0.12, refY);
        
        // DATE ISSUED - BOTTOM LEFT
        ctx.font = `14px 'Inter', sans-serif`;
        ctx.fillStyle = '#000';
        ctx.textAlign = 'left';
        const dateY = canvas.height * 0.85;
        ctx.fillText(`DATE ISSUED: ${today}`, canvas.width * 0.12, dateY);
        
        // QR CODE - RIGHT SIDE
        try {
          const qrSize = 110;
          const qrDataURL = await generateSimpleQRCode(verificationURL, qrSize);
          const qrImg = new Image();
          qrImg.crossOrigin = "Anonymous";
          
          qrImg.onload = function() {
            const qrX = canvas.width - 150;
            const qrY = canvas.height * 0.72;
            ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);
            
            ctx.font = `10px 'Inter', sans-serif`;
            ctx.fillStyle = '#000';
            ctx.textAlign = 'center';
            ctx.fillText("Scan to verify", qrX + qrSize/2, qrY - 5);
            
            resolve(canvas.toDataURL('image/png'));
          };
          
          qrImg.onerror = function() {
            resolve(canvas.toDataURL('image/png'));
          };
          
          qrImg.src = qrDataURL;
        } catch (qrError) {
          resolve(canvas.toDataURL('image/png'));
        }
      };
      
      img.onerror = () => reject(new Error('Failed to load certificate background. Make sure certificate_bg.png is in the same folder.'));
      img.src = CERTIFICATE_BG;
    });
  }

  async function showCertificate() {
    if (!currentRefNo || !currentDisciple) {
      alert('❌ Please load a disciple first (search by RefNo)');
      return;
    }
    
    const books = currentDisciple.books;
    const statusDiv = document.getElementById('statusMsg');
    statusDiv.className = "status-msg loading";
    statusDiv.innerHTML = '🎨 Generating certificate...';
    
    try {
      const certDataURL = await generateCertificateImage(currentDisciple, currentRefNo, books);
      const modal = document.getElementById('certificateModal');
      const displayDiv = document.getElementById('certificateDisplay');
      
      displayDiv.innerHTML = `<img src="${certDataURL}" style="width:100%; height:auto;" alt="Certificate">`;
      modal.style.display = 'flex';
      statusDiv.className = "status-msg success";
      statusDiv.innerHTML = '✅ Certificate generated successfully!';
    } catch (error) {
      statusDiv.className = "status-msg error";
      statusDiv.innerHTML = `❌ Certificate error: ${error.message}`;
      alert(error.message);
    }
  }

  async function generateAllCertificates() {
    if (!csvLoaded || Object.keys(disciplesDB).length === 0) {
      alert('❌ Please load CSV file first');
      return;
    }
    
    const disciplesList = Object.entries(disciplesDB);
    const statusDiv = document.getElementById('statusMsg');
    
    statusDiv.className = "status-msg loading";
    statusDiv.innerHTML = `📚 Generating ${disciplesList.length} certificates...`;
    
    let successCount = 0;
    let failCount = 0;
    
    for (const [refno, disciple] of disciplesList) {
      const books = booksCache[refno] !== undefined ? booksCache[refno] : disciple.csvBooks;
      try {
        const certDataURL = await generateCertificateImage(disciple, refno, books);
        const link = document.createElement('a');
        link.download = `Certificate_${refno}_${disciple.name.replace(/[^a-z0-9]/gi, '_')}.png`;
        link.href = certDataURL;
        link.click();
        successCount++;
        await new Promise(r => setTimeout(r, 500));
      } catch (error) {
        failCount++;
      }
    }
    
    statusDiv.className = "status-msg success";
    statusDiv.innerHTML = `✅ Complete! ${successCount} generated, ${failCount} failed.`;
  }

  function printCertificate() {
    const certImage = document.querySelector('#certificateDisplay img');
    if (!certImage) {
      alert('No certificate to print');
      return;
    }
    
    const printWindow = window.open('', '_blank');
    printWindow.document.write(`
      <html>
        <head>
          <title>Certificate - The Word Journey</title>
          <style>
            body { margin:0; display:flex; justify-content:center; align-items:center; min-height:100vh; background:#fff; }
            img { width:100%; height:auto; max-width:210mm; }
            @media print { body { margin:0; padding:0; } img { box-shadow:none; } }
          </style>
        </head>
        <body>
          <img src="${certImage.src}" alt="Certificate">
          <script>window.onload = function() { setTimeout(function() { window.print(); setTimeout(function() { window.close(); }, 500); }, 500); };<\/script>
        </body>
      </html>
    `);
    printWindow.document.close();
  }

  function downloadCertificate() {
    const certImage = document.querySelector('#certificateDisplay img');
    if (!certImage) {
      alert('No certificate to download');
      return;
    }
    
    const link = document.createElement('a');
    link.download = `Certificate_${currentRefNo}_${currentDisciple.name.replace(/[^a-z0-9]/gi, '_')}.png`;
    link.href = certImage.src;
    link.click();
  }

  function exitToHome() {
    try {
      window.location.href = "Home.html";
    } catch(e) {
      alert("Unable to navigate to Home.html.");
    }
  }

  // ==================== EVENT LISTENERS ====================
  document.getElementById('loadCsvBtn').addEventListener('click', () => {
    const fileInput = document.getElementById('csvFileInput');
    if (fileInput.files && fileInput.files.length > 0) {
      loadCSVFile(fileInput.files[0]);
    } else {
      document.getElementById('statusMsg').className = "status-msg error";
      document.getElementById('statusMsg').innerHTML = '❌ Please select a CSV file first';
    }
  });

  document.getElementById('searchBtn').addEventListener('click', () => {
    const ref = document.getElementById('refnoInput').value.trim();
    loadCertificateByRefno(ref);
  });

  document.getElementById('updateBooksBtn').addEventListener('click', updateBooksOverride);
  document.getElementById('generateCertBtn').addEventListener('click', showCertificate);
  document.getElementById('exitHomeBtn').addEventListener('click', exitToHome);
  document.getElementById('printCertificateBtn').addEventListener('click', printCertificate);
  document.getElementById('downloadCertificateBtn').addEventListener('click', downloadCertificate);
  document.getElementById('batchCertificatesBtn').addEventListener('click', generateAllCertificates);
  
  document.querySelector('.close-modal').addEventListener('click', () => {
    document.getElementById('certificateModal').style.display = 'none';
  });
  
  window.addEventListener('click', (e) => {
    const modal = document.getElementById('certificateModal');
    if (e.target === modal) modal.style.display = 'none';
  });

  document.getElementById('refnoInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      const ref = e.target.value.trim();
      loadCertificateByRefno(ref);
    }
  });

  loadBooksCache();
  
  const urlParams = new URLSearchParams(window.location.search);
  const refnoParam = urlParams.get('refno');
  if (refnoParam) {
    document.getElementById('refnoInput').value = refnoParam;
  }
</script>

</body>
</html>
