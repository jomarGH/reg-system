<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Reading Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg,#f5efe6,#e8dccb);
}

.container {
  max-width:500px;
  margin:50px auto;
  padding:20px;
}

.card {
  background:white;
  border-radius:20px;
  padding:30px;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
  text-align:center;
}

h1 {
  font-family:'Playfair Display', serif;
  color:#7a4c2c;
}

.subtitle {
  font-size:14px;
  color:#8b6b4c;
  margin-bottom:20px;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:30px;
  background:#7a4c2c;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover {
  background:#9b623c;
}

.success {
  background:#e8f5e9;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  text-align:left;
}

.error {
  background:#ffe0e0;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

.footer {
  margin-top:20px;
  font-size:12px;
  color:#8b6b4c;
}

.admin-link {
  margin-top:20px;
  font-size:14px;
}

.admin-link a {
  text-decoration:none;
  color:#7a4c2c;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h1>📖 Bible Reading</h1>
    <div class="subtitle">Registration Form</div>

    <form id="form">
      <input type="text" id="name" placeholder="Full Name (e.g. Juan Luna)" required>
      <input type="text" id="mobile" placeholder="Mobile (e.g. 66695789)" required>
      <input type="text" id="date" readonly>
      <button type="submit" id="submitBtn">Register Now</button>
    </form>

    <div id="msg"></div>

    <!-- 🔐 ADMIN LINK -->
    <div class="admin-link">
      <a href="admin.html" target="_blank">🔐 Admin Panel</a>
    </div>

    <div class="footer">
      "Man shall not live by bread alone, but by every word that proceeds from the mouth of God." – Matthew 4:4
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
const URL = "https://script.google.com/macros/s/AKfycbw-MOos0HaIFGAg6JiArWEj0gldzG4u3NA6b7um6rWN5NxgkLNeoJPJzdwWOpOd1s5_9g/exec";

let existingData = [];

// SET DATE
function setDate(){
  document.getElementById("date").value =
  new Date().toISOString().split('T')[0];
}
setDate();

// LOAD EXISTING DATA
async function loadData(){
  try{
    const res = await fetch(URL + "?password=bible2025");
    const data = await res.json();
    existingData = data || [];
  }catch{}
}
loadData();

// FORMAT NAME
function formatName(name){
  return name.toLowerCase().split(" ").filter(w=>w)
  .map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(" ");
}

// FORMAT MOBILE
function formatMobile(mobile){
  mobile = mobile.replace(/\D/g,'');
  if(mobile.startsWith("974")) mobile = mobile.slice(3);
  if(mobile.length !== 8) return null;
  return "+974" + mobile;
}

// DUPLICATE CHECK
function isDuplicate(name, mobile){
  return existingData.some(r =>
    r.Name.toLowerCase().trim() === name.toLowerCase().trim() &&
    r.Mobile.trim() === mobile.trim()
  );
}

// SUBMIT
document.getElementById("form").addEventListener("submit", async (e)=>{
e.preventDefault();

let name = formatName(document.getElementById("name").value.trim());
let mobile = formatMobile(document.getElementById("mobile").value.trim());
const date = document.getElementById("date").value;

const msg = document.getElementById("msg");
const btn = document.getElementById("submitBtn");

// VALIDATION
if(!mobile){
  msg.innerHTML = `<div class="error">Invalid Qatar mobile number</div>`;
  return;
}

// DUPLICATE CHECK
if(isDuplicate(name, mobile)){
  msg.innerHTML = `<div class="error">This person is already registered.</div>`;
  return;
}

// DISABLE BUTTON
btn.disabled = true;
btn.innerText = "Submitting...";

try{
const res = await fetch(URL,{
method:"POST",
body:JSON.stringify({
action:"register",
name,
mobile,
registrationDate:date
})
});

const data = await res.json();

if(data.status==="success"){

existingData.push({Name:name, Mobile:mobile});

// 📱 AUTO WHATSAPP OPEN
window.open(`https://wa.me/${mobile.replace('+','')}?text=${encodeURIComponent(
`Hello ${name}, you are successfully registered for Bible Reading 🙏\nRefNo: ${data.refno}`
)}`, "_blank");

msg.innerHTML = `
<div class="success">
<strong>✅ Successfully Registered</strong><br><br>

RefNo: ${data.refno}<br>
Name: ${name}<br>
Mobile: ${mobile}

<br><br>
<canvas id="qr"></canvas><br><br>

<button onclick="printSlip('${data.refno}','${name}','${mobile}')">🖨 Print Slip</button>
<button onclick="resetForm()">🔄 Register New</button>
<button onclick="exitSystem()">❌ Exit</button>
</div>
`;

QRCode.toCanvas(document.getElementById('qr'),
`Ref:${data.refno} Name:${name} Mobile:${mobile}`);

}else{
msg.innerHTML = `<div class="error">${data.message}</div>`;
btn.disabled = false;
btn.innerText = "Register Now";
}

}catch{
msg.innerHTML = `<div class="error">Connection error. Try again.</div>`;
btn.disabled = false;
btn.innerText = "Register Now";
}

});

// RESET
function resetForm(){
document.getElementById("form").reset();
document.getElementById("msg").innerHTML="";
document.getElementById("submitBtn").disabled = false;
document.getElementById("submitBtn").innerText="Register Now";
setDate();
}

// EXIT
function exitSystem(){
window.open('', '_self');
window.close();
window.location.href = "about:blank";
}

// PRINT
function printSlip(ref,name,mobile){
const w = window.open('');
w.document.write(`
<h2>Bible Registration</h2>
<p>RefNo: ${ref}</p>
<p>Name: ${name}</p>
<p>Mobile: ${mobile}</p>
`);
w.print();
}
</script>

</body>
</html>
