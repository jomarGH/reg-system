<!DOCTYPE html>
<html>
<head>
<title>Super Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.container { max-width:1200px; margin:auto; background:white; padding:20px; border-radius:10px; }

input,button {
  padding:8px; margin:5px; border-radius:5px; border:1px solid #ccc;
}

button { cursor:pointer; background:#7a4c2c; color:white; }

.cards {
  display:flex; gap:10px; margin:15px 0;
}

.card {
  flex:1; padding:15px; background:#eee; border-radius:10px;
  text-align:center; font-weight:bold;
}

table { width:100%; border-collapse:collapse; margin-top:10px; }
td,th { padding:10px; border-bottom:1px solid #ddd; text-align:left; }

#chart { margin-top:20px; }
</style>

</head>

<body>

<div class="container">

<h2>📊 Super Admin Dashboard</h2>

<!-- LOGIN -->
<div id="login">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none;">

<!-- FILTERS -->
<input type="date" id="fromDate">
<input type="date" id="toDate">
<input type="text" id="search" placeholder="Search name/mobile">

<button onclick="applyFilter()">Apply Filter</button>
<button onclick="exportCSV()">⬇ Export CSV</button>
<button onclick="toggleAnalytics()">📊 Show/Hide Analytics</button>
<button onclick="goHome()">🏠 Return Home</button>

<!-- STATS -->
<div class="cards">
<div class="card" id="total">Total: 0</div>
<div class="card" id="today">Today: 0</div>
<div class="card" id="month">This Month: 0</div>
</div>

<!-- CHART -->
<canvas id="chart"></canvas>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>RefNo</th>
<th>Name</th>
<th>Mobile</th>
<th>RegistrationDay</th>
<th>Timestamp</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzfwz9wdrTSad8z5CPk_OI1y1_7wlpmyzxJv5aZQAd4sN2EtAKWBxMLExI97FIomeRa/exec";

let rawData = [];
let filteredData = [];
let chart;
let analyticsVisible = true;

/* =======================
   LOGIN
======================= */
function login(){
fetch(API_URL + "?password=" + document.getElementById("pass").value)
.then(r=>r.json())
.then(data=>{
if(data.error){ alert("Wrong password"); return; }

document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";

rawData = data;
applyFilter();
})
.catch(()=> alert("Server Error"));
}

/* =======================
   REFNO
======================= */
function getRefNo(r,i){
return r.RefNo || (26000 + i);
}

/* =======================
   DATE FORMAT FIX
======================= */
function formatToISO(dateStr){
if(!dateStr || dateStr === "-") return "";

let parts = dateStr.split(" ")[0].split("/");
if(parts.length !== 3) return dateStr;

return `${parts[2]}-${parts[1]}-${parts[0]}`;
}

function getDateOnly(r){
if(!r.RegistrationDate) return "-";
return r.RegistrationDate.split(" ")[0]; // remove time
}

/* =======================
   TIMESTAMP CLEAN FIX
======================= */
function getTimestamp(r){

let val = r.Timestamp;
if(!val || val === "-") return "-";

// already formatted
if(val.includes("/")) return val;

let d = new Date(val);
if(isNaN(d)) return val;

return d.toLocaleDateString("en-GB") + " " +
       d.toLocaleTimeString("en-GB");
}

/* =======================
   FILTER
======================= */
function applyFilter(){

let from = document.getElementById("fromDate").value;
let to = document.getElementById("toDate").value;
let search = document.getElementById("search").value.toLowerCase();

filteredData = rawData.filter(r=>{

let name = (r.Name || "").toLowerCase();
let mobile = (r.Mobile || "").toString();

let matchSearch =
name.includes(search) ||
mobile.includes(search);

// FIXED DATE FILTER
let isoDate = formatToISO(r.RegistrationDate);

let matchDate =
(!from || isoDate >= from) &&
(!to || isoDate <= to);

return matchSearch && matchDate;
});

render(filteredData);
updateStats(filteredData);
updateChart(filteredData);
}

/* =======================
   TABLE RENDER
======================= */
function render(data){
const tbody = document.querySelector("tbody");
tbody.innerHTML="";

data.forEach((r,i)=>{
tbody.innerHTML+=`
<tr>
<td>${getRefNo(r,i)}</td>
<td>${r.Name || "-"}</td>
<td>${r.Mobile || "-"}</td>
<td>${getDateOnly(r)}</td>
<td>${getTimestamp(r)}</td>
</tr>`;
});
}

/* =======================
   STATS
======================= */
function updateStats(data){

let today = new Date().toISOString().split('T')[0];
let month = today.slice(0,7);

let todayCount = data.filter(r=>formatToISO(r.RegistrationDate)===today).length;
let monthCount = data.filter(r=>formatToISO(r.RegistrationDate).startsWith(month)).length;

document.getElementById("total").innerText = "Total: "+data.length;
document.getElementById("today").innerText = "Today: "+todayCount;
document.getElementById("month").innerText = "This Month: "+monthCount;
}

/* =======================
   CHART
======================= */
function updateChart(data){

if(!analyticsVisible) return;

let counts = {};

data.forEach(r=>{
let d = formatToISO(r.RegistrationDate);
if(!d) return;
counts[d] = (counts[d]||0)+1;
});

let labels = Object.keys(counts).sort();
let values = labels.map(k=>counts[k]);

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Registrations",
data:values
}]
}
});
}

/* =======================
   TOGGLE ANALYTICS
======================= */
function toggleAnalytics(){
analyticsVisible = !analyticsVisible;
document.getElementById("chart").style.display =
analyticsVisible ? "block" : "none";
}

/* =======================
   EXPORT CSV
======================= */
function exportCSV(){

let data = filteredData.length ? filteredData : rawData;

let csv = [["RefNo","Name","Mobile","RegistrationDate","Timestamp"]];

data.forEach((r,i)=>{
csv.push([
getRefNo(r,i),
r.Name || "",
r.Mobile || "",
getDateOnly(r),
getTimestamp(r)
]);
});

let content = csv.map(e=>e.join(",")).join("\n");

let blob = new Blob(["\uFEFF"+content], { type: "text/csv;charset=utf-8;" });

let link = document.createElement("a");
link.href = window.URL.createObjectURL(blob);
link.download = "registrations.csv";

document.body.appendChild(link);
link.click();
document.body.removeChild(link);
}

/* =======================
   HOME
======================= */
function goHome(){
window.location.href = "index.html";
}

</script>

</body>
</html>
