<!DOCTYPE html>
<html>
<head>
<title>Super Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.container { max-width:1200px; margin:auto; background:white; padding:20px; border-radius:10px; }

input,button {
  padding:8px; margin:5px; border-radius:5px; border:1px solid #ccc;
}

button { cursor:pointer; background:#7a4c2c; color:white; }

.cards {
  display:flex; gap:10px; margin:15px 0;
}

.card {
  flex:1; padding:15px; background:#eee; border-radius:10px;
  text-align:center; font-weight:bold;
}

table { width:100%; border-collapse:collapse; margin-top:10px; }
td,th { padding:10px; border-bottom:1px solid #ddd; text-align:left; }

#chart { margin-top:20px; }
</style>

</head>

<body>

<div class="container">

<h2>📊 Super Admin Dashboard</h2>

<!-- LOGIN -->
<div id="login">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none;">

<!-- FILTERS -->
<input type="date" id="fromDate">
<input type="date" id="toDate">
<input type="text" id="search" placeholder="Search name/mobile">

<button onclick="applyFilter()">Apply Filter</button>
<button onclick="exportCSV()">⬇ Export CSV</button>
<button onclick="toggleAnalytics()">📊 Show/Hide Analytics</button>

<!-- STATS -->
<div class="cards">
<div class="card" id="total">Total: 0</div>
<div class="card" id="today">Today: 0</div>
<div class="card" id="month">This Month: 0</div>
</div>

<!-- CHART -->
<canvas id="chart"></canvas>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>RefNo</th>
<th>Name</th>
<th>Mobile</th>
<th>Date</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

</div>

<script>

// 🔥 IMPORTANT: renamed to avoid conflict
const API_URL = "https://script.google.com/macros/s/AKfycbw-MOos0HaIFGAg6JiArWEj0gldzG4u3NA6b7um6rWN5NxgkLNeoJPJzdwWOpOd1s5_9g/exec";

let rawData = [];
let filteredData = [];
let chart;
let analyticsVisible = true;

// LOGIN
function login(){
fetch(API_URL+"?password="+document.getElementById("pass").value)
.then(r=>r.json())
.then(data=>{
if(data.error){ alert("Wrong password"); return; }

document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";

rawData = data;
applyFilter();
});
}

// SAFE REFNO
function safeRef(ref){
return (!ref || isNaN(ref)) ? "-" : Number(ref);
}

// SAFE DATE
function formatDate(val){
if(!val) return "-";
let d = new Date(val);
if(isNaN(d)) return val;
return d.toLocaleString();
}

// FILTER
function applyFilter(){

let from = document.getElementById("fromDate").value;
let to = document.getElementById("toDate").value;
let search = document.getElementById("search").value.toLowerCase();

filteredData = rawData.filter(r=>{

let matchSearch =
(r.Name || "").toLowerCase().includes(search) ||
(r.Mobile || "").includes(search);

let date = r.RegistrationDate || "";

let matchDate =
(!from || date>=from) &&
(!to || date<=to);

return matchSearch && matchDate;
});

render(filteredData);
updateStats(filteredData);
updateChart(filteredData);
}

// RENDER TABLE
function render(data){
const tbody = document.querySelector("tbody");
tbody.innerHTML="";

data.forEach(r=>{
tbody.innerHTML+=`
<tr>
<td>${safeRef(r.RefNo)}</td>
<td>${r.Name || "-"}</td>
<td>${r.Mobile || "-"}</td>
<td>${formatDate(r.Timestamp)}</td>
</tr>`;
});
}

// STATS
function updateStats(data){

let today = new Date().toISOString().split('T')[0];
let month = today.slice(0,7);

let todayCount = data.filter(r=>r.RegistrationDate===today).length;
let monthCount = data.filter(r=>(r.RegistrationDate||"").startsWith(month)).length;

document.getElementById("total").innerText = "Total: "+data.length;
document.getElementById("today").innerText = "Today: "+todayCount;
document.getElementById("month").innerText = "This Month: "+monthCount;
}

// CHART
function updateChart(data){

if(!analyticsVisible) return;

let counts = {};

data.forEach(r=>{
let d = r.RegistrationDate;
if(!d) return;
counts[d] = (counts[d]||0)+1;
});

let labels = Object.keys(counts).sort();
let values = labels.map(k=>counts[k]);

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Registrations",
data:values,
fill:false,
tension:0.2
}]
}
});
}

// TOGGLE ANALYTICS
function toggleAnalytics(){
analyticsVisible = !analyticsVisible;
document.getElementById("chart").style.display =
analyticsVisible ? "block" : "none";
}

// EXPORT CSV (FULLY FIXED)
function exportCSV(){

let data = filteredData.length ? filteredData : rawData;

let csv = [["RefNo","Name","Mobile","Date"]];

data.forEach(r=>{
csv.push([
safeRef(r.RefNo),
r.Name || "",
r.Mobile || "",
formatDate(r.Timestamp)
]);
});

let content = csv.map(e=>e.join(",")).join("\n");

let blob = new Blob(["\uFEFF"+content], { type: "text/csv;charset=utf-8;" });

// ✅ FIXED DOWNLOAD
let link = document.createElement("a");
link.href = window.URL.createObjectURL(blob);
link.download = "bible_participants.csv";

document.body.appendChild(link);
link.click();
document.body.removeChild(link);
}

</script>

</body>
</html>
